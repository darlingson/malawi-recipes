{% extends 'base.html' %}

{% block content %}
    <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8 py-8">
        <h1>Recipe List</h1>
        {% for recipe in recipes %}
        <div class="bg-black shadow-md border border-gray-200 rounded-lg max-w-2xl w-full m-3">
            <div class="p-3">
                <a href="#">
                    <h5 class="text-white font-bold text-2xl tracking-tight mb-2">{{ recipe.title }}</h5>
                </a>
                <p class="font-normal text-white mb-3"><span class="text-gray-300 font-semibold">For this recipe you need:</span> <span class="text-gray-700 font-semibold">{{ recipe.ingredients }}</span></p>
                <a class="text-white bg-blue-700 hover:bg-blue-800 focus:ring-4 focus:ring-blue-300 font-medium rounded-lg text-sm px-3 py-2 text-center inline-flex items-center" href="{{ url_for('recipe', recipe_id=recipe.id) }}">
                    Read more
                </a>
            </div>
        </div>
        {% endfor %}
    </div>
{% endblock %}
