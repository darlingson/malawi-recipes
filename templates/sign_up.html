{% extends "authBase.html" %}

{% block content %}
<div class="bg-white p-8 rounded shadow-md form-container">
    <div class="mb-6">
        <div class="flex">
            <a href="/login" class="flex-1 py-2 px-4 text-center bg-gray-300 text-gray-600 rounded-tl-md rounded-bl-md">Login</a>
            <a href="/register" class="flex-1 py-2 px-4 text-center bg-blue-500 text-white  rounded-tr-md rounded-br-md">Register</a>
        </div>
    </div>
    
    <!-- Login Form -->
    <form action="#" method="post" class="hidden">
        <!-- Your login form fields go here -->
        <div class="mb-4">
            <label for="email" class="block text-gray-600 text-sm font-medium mb-2">Email:</label>
            <input type="email" id="email" name="email" class="w-full px-3 py-2 border rounded-md">
        </div>
        <div class="mb-4">
            <label for="password" class="block text-gray-600 text-sm font-medium mb-2">Password:</label>
            <input type="password" id="password" name="password" class="w-full px-3 py-2 border rounded-md">
        </div>
        <button type="submit" class="w-full bg-blue-500 text-white py-2 rounded-md hover:bg-blue-600">Login</button>
    </form>

    <!-- Registration Form (hidden by default) -->
    <form action="#" method="post" >
        <!-- Your registration form fields go here -->
        <div class="mb-4">
            <label for="newEmail" class="block text-gray-600 text-sm font-medium mb-2">New Email:</label>
            <input type="email" id="newEmail" name="newEmail" class="w-full px-3 py-2 border rounded-md">
        </div>
        <div class="mb-4">
            <label for="newPassword" class="block text-gray-600 text-sm font-medium mb-2">New Password:</label>
            <input type="password" id="newPassword" name="newPassword" class="w-full px-3 py-2 border rounded-md">
        </div>
        <button type="submit" class="w-full bg-blue-500 text-white py-2 rounded-md hover:bg-blue-600">Register</button>
    </form>
</div>
{%endblock%}
